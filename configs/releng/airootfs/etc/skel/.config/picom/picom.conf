opacity-rule = [
  "99:class_g = 'polybar'"
];

backend = "glx";

blur-background = true;
blur-method = "kawase";
blur-strength = 10;

fading = true;
fade-delta = 5.0;

# Shadows
shadow = true;
no-dnd-shadow = true;
no-dock-shadow = true;
clear-shadow = true;
shadow-radius = 5;
shadow-offset-x = -2;
shadow-offset-y = -2;
shadow-opacity = 0.15;

wintypes:
{
  full-shadow = true;
};
