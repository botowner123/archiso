[bar/mainbar]
monitor = ${env:MONITOR:}
background = #20ffffff
foreground = #ffffff
font-0 = "JetBrainsMono Nerd Font:style=Medium:size=10;3"
font-1 = "Font Awesome 7 Free Solid:style=Solid:size=11;3"
font-2 = "Font Awesome 7 Brands:style=Regular:size=11;3"
font-3 = "JetBrainsMono Nerd Font:size=14;4"
height = 24
line-size = 2
modules-left = apple i3
modules-right = battery network redshift datetime
padding = 3
module-margin = 1.5

[module/apple]
type = custom/text
content = 

[module/i3]
type = internal/i3
label-focused-underline = #FFFFFF
strip-wsnumber = true
label-mode-padding = 1
label-focused = %index%
label-unfocused = %index%
label-focused-padding = 1
label-unfocused-padding = 1
enable-scroll = false
reverse-scroll = false

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP0
format-charging = <ramp-capacity>
format-discharging = <ramp-capacity>
ramp-capacity-0 = ""
ramp-capacity-1 = ""
ramp-capacity-2 = ""
ramp-capacity-3 = ""
ramp-capacity-4 = ""

[module/network]
type = internal/network
interface = wlp2s0
label-disconnected = " Not connected" 
label-connected = ""

[module/redshift]
type = custom/text
content = 
click-left = redshift -O 4300
click-right = redshift -x

[module/datetime]
type = internal/date
date = %a %b %d  %H:%M %p
